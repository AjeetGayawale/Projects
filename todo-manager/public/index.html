<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal To-Do Task Manager</title>
    <!-- Google Fonts for rich typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Tasks</h1>
            <p class="subtitle">Stay organized, focused, and minimal.</p>

            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="stat-remaining">0</span>
                    <span class="stat-label">Remaining</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="stat-completed">0</span>
                    <span class="stat-label">Completed</span>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </header>

        <form id="todo-form" class="todo-form">
            <div class="input-group">
                <div class="inputs-wrapper">
                    <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                    <input type="text" id="todo-desc" placeholder="Task description (optional)" autocomplete="off">
                </div>
                <button type="submit" class="add-btn" aria-label="Add task">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </form>

        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Todos will be injected here via JS -->
        </ul>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
